# 正清系统 - 物流清关管理平台
# 域名: xt.com.pt

server {
    listen 80;
    server_name xt.com.pt;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    client_max_body_size 25m;
    server_name xt.com.pt;
    ssl_certificate /etc/letsencrypt/live/xt.com.pt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xt.com.pt/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /uploads/ {
        add_header Access-Control-Allow-Origin * always;
        proxy_pass http://zhengqing-new:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass http://zhengqing-new:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /usr/share/nginx/html/zhengqing;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}

