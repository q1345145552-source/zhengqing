version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: warehouse_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wm-backend
    restart: unless-stopped
    networks:
      - nginx-public
      - default
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/warehouse_mgmt?schema=public
      JWT_ACCESS_SECRET: 
      JWT_REFRESH_SECRET: 
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    container_name: wm-frontend
    restart: unless-stopped
    networks:
      - nginx-public
      - default
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

  zhengqing-new:
    image: node:20-alpine
    container_name: zhengqing-new
    restart: unless-stopped
    working_dir: /app/backend
    command: sh -c /app/startup.sh
    environment:
      PORT: 3001
    ports:
      - "3002:3001"
    volumes:
      - /root/zhengqing:/app
      - /docker/nginx/html/zhengqing:/frontend-dist
    networks:
      - nginx-public
      - default
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  nginx-public:
    external: true
